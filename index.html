<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        /* 主页样式 */
        .home-view {
            text-align: center;
        }

        .home-view h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .tool-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .tool-btn {
            padding: 20px 30px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .tool-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.4);
        }

        .tool-btn:active {
            transform: translateY(0);
        }

        /* 详情页样式 */
        .detail-view {
            display: none;
        }

        .detail-view.active {
            display: block;
        }

        .back-btn {
            background: #f0f0f0;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .back-btn:hover {
            background: #e0e0e0;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .date-display {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        /* 圆环进度 */
        .progress-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            position: relative;
        }

        .progress-ring {
            width: 200px;
            height: 200px;
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.5s ease;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .progress-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .progress-value {
            font-size: 36px;
            font-weight: bold;
            color: #333;
        }

        .progress-unit {
            font-size: 14px;
            color: #666;
        }

        .progress-goal {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        /* 按钮 */
        .buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .btn-100 {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .btn-550 {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* 输入框 */
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .input-section input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .input-section input:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-section button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .input-section button:hover {
            background: #5568d3;
        }

        /* 状态提示 */
        .status-indicator {
            text-align: center;
            margin-bottom: 15px;
            font-size: 12px;
            padding: 8px;
            border-radius: 8px;
            background: #f5f5f5;
        }

        .status-indicator.connected {
            background: #d4edda;
            color: #155724;
        }

        .status-indicator.disconnected {
            background: #fff3cd;
            color: #856404;
        }

        .status-indicator.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status-indicator.loading {
            background: #e2e3e5;
            color: #383d41;
        }

        .records-section {
            margin-bottom: 25px;
        }

        .records-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .records-list {
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .record-item:last-child {
            border-bottom: none;
        }

        .record-time {
            font-size: 13px;
            color: #666;
        }

        .record-amount {
            font-weight: bold;
            color: #4facfe;
        }

        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
            transition: background 0.3s ease;
        }

        .delete-btn:hover {
            background: #ee5a5a;
        }

        /* 图表 */
        .chart-section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e0e0e0;
        }

        .chart-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            text-align: center;
        }

        .chart-container {
            width: 100%;
            height: 200px;
        }

        .empty-records {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 14px;
        }

        /* Gist 配置 */
        .gist-config {
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .gist-config input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .gist-config button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .gist-config button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 主页视图 -->
        <div id="homeView" class="home-view">
            <h1>工具集</h1>
            <div class="tool-grid">
                <button class="tool-btn" onclick="showWaterTracker()">
                    <span>💧</span>
                    <span>喝水记录</span>
                </button>
            </div>
        </div>

        <!-- 喝水记录详情视图 -->
        <div id="waterTrackerView" class="detail-view">
            <button class="back-btn" onclick="goHome()">
                <span>←</span>
                <span>返回主页</span>
            </button>
            
            <h1>💧 喝水记录</h1>
            <div class="date-display" id="dateDisplay"></div>

            <!-- 圆环进度 -->
            <div class="progress-container">
                <svg class="progress-ring">
                    <circle
                        class="progress-ring__circle-bg"
                        stroke="#e0e0e0"
                        stroke-width="12"
                        fill="transparent"
                        r="80"
                        cx="100"
                        cy="100"
                    />
                    <circle
                        class="progress-ring__circle"
                        stroke="url(#gradient)"
                        stroke-width="12"
                        stroke-linecap="round"
                        fill="transparent"
                        r="80"
                        cx="100"
                        cy="100"
                    />
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#4facfe" />
                            <stop offset="100%" stop-color="#00f2fe" />
                        </linearGradient>
                    </defs>
                </svg>
                <div class="progress-content">
                    <div class="progress-value" id="totalAmount">0</div>
                    <div class="progress-unit">ml</div>
                    <div class="progress-goal">目标: 2000ml</div>
                </div>
            </div>

            <!-- Gist 配置 -->
            <div class="gist-config" id="gistConfig">
                <input type="text" id="gistTokenInput" placeholder="输入 GitHub Personal Access Token" />
                <input type="text" id="gistIdInput" placeholder="输入 Gist ID (可选，留空自动创建)" />
                <button onclick="connectGist()">连接 Gist</button>
            </div>

            <!-- 文件状态 -->
            <div id="statusIndicator" class="status-indicator disconnected">
                未连接 Gist
            </div>

            <!-- 按钮 -->
            <div class="buttons">
                <button class="btn btn-100" onclick="addWater(100)">+100ml</button>
                <button class="btn btn-550" onclick="addWater(550)">+550ml</button>
            </div>

            <!-- 输入框 -->
            <div class="input-section">
                <input type="number" id="customAmount" placeholder="输入自定义毫升数" min="1" />
                <button onclick="addCustomWater()">添加</button>
            </div>

            <!-- 当天记录 -->
            <div class="records-section">
                <div class="records-title">今日记录</div>
                <div class="records-list" id="recordsList">
                    <div class="empty-records">暂无记录</div>
                </div>
            </div>

            <!-- 图表 -->
            <div class="chart-section">
                <div class="chart-title">最近7天喝水量</div>
                <div class="chart-container">
                    <canvas id="chart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const GOAL = 2000;
        const GIST_FILENAME = 'water-records.json';
        const DB_NAME = 'WaterTrackerDB';
        const STORE_NAME = 'gistConfig';
        
        // GitHub Personal Access Token - 请替换为你自己的 token
        // 需要 gist 权限
        let GITHUB_TOKEN = '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';
        let GIST_ID = null;
        
        let waterData = {};
        let isConnected = false;

        // ==================== IndexedDB 辅助函数 ====================
        const dbPromise = new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onerror = () => reject(request.error);
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME);
                }
            };
            request.onsuccess = () => resolve(request.result);
        });

        async function getConfigFromDB(key) {
            const db = await dbPromise;
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get(key);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function saveConfigToDB(key, value) {
            const db = await dbPromise;
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.put(value, key);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        // ==================== 视图切换 ====================
        function showWaterTracker() {
            document.getElementById('homeView').style.display = 'none';
            document.getElementById('waterTrackerView').classList.add('active');
            initWaterTracker();
        }

        function goHome() {
            document.getElementById('waterTrackerView').classList.remove('active');
            document.getElementById('homeView').style.display = 'block';
        }

        // ==================== Gist API ====================
        async function fetchGist(gistId) {
            const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            
            if (!response.ok) {
                throw new Error(`获取 Gist 失败: ${response.status}`);
            }
            
            return await response.json();
        }

        async function createGist(data) {
            const response = await fetch('https://api.github.com/gists', {
                method: 'POST',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    description: 'Water Tracker Data',
                    public: false,
                    files: {
                        [GIST_FILENAME]: {
                            content: JSON.stringify(data, null, 2)
                        }
                    }
                })
            });
            
            if (!response.ok) {
                throw new Error(`创建 Gist 失败: ${response.status}`);
            }
            
            return await response.json();
        }

        async function updateGist(gistId, data) {
            const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    files: {
                        [GIST_FILENAME]: {
                            content: JSON.stringify(data, null, 2)
                        }
                    }
                })
            });
            
            if (!response.ok) {
                throw new Error(`更新 Gist 失败: ${response.status}`);
            }
            
            return await response.json();
        }

        // ==================== 数据加载和保存 ====================
        async function loadData() {
            if (!GIST_ID) {
                waterData = {};
                return;
            }

            try {
                updateStatus('loading', '正在加载数据...');
                const gist = await fetchGist(GIST_ID);
                const content = gist.files[GIST_FILENAME]?.content;
                
                if (content) {
                    waterData = JSON.parse(content);
                    if (typeof waterData !== 'object') {
                        waterData = {};
                    }
                } else {
                    waterData = {};
                }
                
                isConnected = true;
                updateStatus('connected', '已连接 Gist');
                updateUI();
            } catch (err) {
                console.error('加载数据失败:', err);
                updateStatus('error', '加载数据失败: ' + err.message);
                waterData = {};
            }
        }

        async function saveData(data) {
            waterData = data;
            
            if (!isConnected || !GIST_ID) {
                return;
            }

            try {
                cleanOldData(waterData);
                await updateGist(GIST_ID, waterData);
                console.log('数据已保存到 Gist');
            } catch (err) {
                console.error('保存数据失败:', err);
                updateStatus('error', '保存数据失败: ' + err.message);
            }
        }

        // ==================== Gist 连接 ====================
        async function connectGist() {
            const tokenInput = document.getElementById('gistTokenInput');
            const gistIdInput = document.getElementById('gistIdInput');
            
            const token = tokenInput.value.trim();
            const gistId = gistIdInput.value.trim() || null;
            
            if (!token) {
                alert('请输入 GitHub Personal Access Token');
                return;
            }

            GITHUB_TOKEN = token;
            updateStatus('loading', '正在连接...');

            try {
                if (gistId) {
                    // 使用现有的 Gist
                    GIST_ID = gistId;
                    await loadData();
                } else {
                    // 创建新的 Gist
                    const initialData = {};
                    const newGist = await createGist(initialData);
                    GIST_ID = newGist.id;
                    
                    // 保存配置
                    await saveConfigToDB('token', GITHUB_TOKEN);
                    await saveConfigToDB('gistId', GIST_ID);
                    
                    waterData = initialData;
                    isConnected = true;
                    updateStatus('connected', '已创建并连接新 Gist: ' + GIST_ID);
                    updateUI();
                }
                
                // 保存配置到 IndexedDB
                await saveConfigToDB('token', GITHUB_TOKEN);
                await saveConfigToDB('gistId', GIST_ID);
                
                // 隐藏配置区域
                document.getElementById('gistConfig').style.display = 'none';
            } catch (err) {
                console.error('连接 Gist 失败:', err);
                updateStatus('error', '连接失败: ' + err.message);
            }
        }

        // ==================== 状态更新 ====================
        function updateStatus(status, message) {
            const indicator = document.getElementById('statusIndicator');
            indicator.textContent = message;
            indicator.className = 'status-indicator ' + status;
        }

        // ==================== 初始化喝水记录 ====================
        async function initWaterTracker() {
            updateDateDisplay();
            
            // 尝试从 IndexedDB 恢复配置
            try {
                const savedToken = await getConfigFromDB('token');
                const savedGistId = await getConfigFromDB('gistId');
                
                if (savedToken && savedGistId) {
                    GITHUB_TOKEN = savedToken;
                    GIST_ID = savedGistId;
                    document.getElementById('gistConfig').style.display = 'none';
                    await loadData();
                } else {
                    updateStatus('disconnected', '未连接 Gist，请配置');
                }
            } catch (err) {
                console.error('恢复配置失败:', err);
                updateStatus('disconnected', '未连接 Gist，请配置');
            }
            
            updateUI();
        }

        // ==================== 日期相关 ====================
        function getTodayString() {
            const today = new Date();
            return today.toISOString().split('T')[0];
        }

        function updateDateDisplay() {
            const today = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('dateDisplay').textContent = today.toLocaleDateString('zh-CN', options);
        }

        // ==================== 喝水记录操作 ====================
        async function addWater(amount) {
            const today = getTodayString();

            if (!waterData[today]) {
                waterData[today] = [];
            }

            waterData[today].push({
                id: Date.now(),
                amount: amount,
                time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
            });

            await saveData(waterData);
            updateUI();
        }

        async function addCustomWater() {
            const input = document.getElementById('customAmount');
            const amount = parseInt(input.value);

            if (amount && amount > 0) {
                await addWater(amount);
                input.value = '';
            } else {
                alert('请输入有效的正整数');
            }
        }

        async function deleteRecord(recordId) {
            const today = getTodayString();

            if (waterData[today]) {
                waterData[today] = waterData[today].filter(r => r.id !== recordId);
                await saveData(waterData);
                updateUI();
            }
        }

        // ==================== 数据处理 ====================
        function cleanOldData(data) {
            const today = new Date();
            const thirtyDaysAgo = new Date(today);
            thirtyDaysAgo.setDate(today.getDate() - 30);

            Object.keys(data).forEach(date => {
                const recordDate = new Date(date);
                if (recordDate < thirtyDaysAgo) {
                    delete data[date];
                }
            });
        }

        function getTodayTotal() {
            const today = getTodayString();
            const todayRecords = waterData[today] || [];
            return todayRecords.reduce((sum, record) => sum + record.amount, 0);
        }

        // ==================== UI 更新 ====================
        function updateProgress(total) {
            const circle = document.querySelector('.progress-ring__circle');
            const radius = circle.r.baseVal.value;
            const circumference = radius * 2 * Math.PI;

            circle.style.strokeDasharray = `${circumference} ${circumference}`;

            const progress = Math.min(total / GOAL, 1);
            const offset = circumference - progress * circumference;
            circle.style.strokeDashoffset = offset;
        }

        function updateUI() {
            const total = getTodayTotal();
            document.getElementById('totalAmount').textContent = total;
            updateProgress(total);
            updateRecordsList();
            drawChart();
        }

        function updateRecordsList() {
            const today = getTodayString();
            const records = waterData[today] || [];
            const listEl = document.getElementById('recordsList');

            if (records.length === 0) {
                listEl.innerHTML = '<div class="empty-records">暂无记录</div>';
                return;
            }

            listEl.innerHTML = records.map(record => `
                <div class="record-item">
                    <span class="record-time">${record.time}</span>
                    <div>
                        <span class="record-amount">+${record.amount}ml</span>
                        <button class="delete-btn" onclick="deleteRecord(${record.id})">删除</button>
                    </div>
                </div>
            `).join('');

            listEl.scrollTop = listEl.scrollHeight;
        }

        // ==================== 图表 ====================
        function getLast7DaysData() {
            const result = [];
            const today = new Date();

            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(today.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                const records = waterData[dateStr] || [];
                const total = records.reduce((sum, r) => sum + r.amount, 0);

                result.push({
                    date: date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }),
                    total: total
                });
            }

            return result;
        }

        function drawChart() {
            const canvas = document.getElementById('chart');
            const ctx = canvas.getContext('2d');
            const data = getLast7DaysData();

            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;

            const padding = 40;
            const width = canvas.width - padding * 2;
            const height = canvas.height - padding * 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const maxAmount = Math.max(...data.map(d => d.total), GOAL);
            const yMax = Math.ceil(maxAmount / 500) * 500;

            ctx.strokeStyle = '#e0e0e0';
            ctx.fillStyle = '#999';
            ctx.font = '11px Arial';
            ctx.textAlign = 'right';

            for (let i = 0; i <= 4; i++) {
                const y = padding + height - (i / 4) * height;
                const value = Math.round((i / 4) * yMax);

                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(canvas.width - padding, y);
                ctx.stroke();

                ctx.fillText(value, padding - 5, y + 4);
            }

            ctx.textAlign = 'center';
            const xStep = width / (data.length - 1);
            data.forEach((d, i) => {
                const x = padding + i * xStep;
                ctx.fillText(d.date, x, canvas.height - padding + 20);
            });

            const points = data.map((d, i) => ({
                x: padding + i * xStep,
                y: padding + height - (d.total / yMax) * height,
                value: d.total
            }));

            if (points.length > 1) {
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);

                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }

                ctx.strokeStyle = '#667eea';
                ctx.lineWidth = 2;
                ctx.stroke();

                const gradient = ctx.createLinearGradient(0, padding, 0, canvas.height - padding);
                gradient.addColorStop(0, 'rgba(102, 126, 234, 0.3)');
                gradient.addColorStop(1, 'rgba(102, 126, 234, 0)');

                ctx.lineTo(points[points.length - 1].x, canvas.height - padding);
                ctx.lineTo(points[0].x, canvas.height - padding);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();
            }

            points.forEach(point => {
                ctx.beginPath();
                ctx.arc(point.x, point.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#667eea';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = '#333';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(point.value, point.x, point.y - 10);
            });
        }

        // ==================== 事件监听 ====================
        window.addEventListener('resize', drawChart);

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.activeElement.id === 'customAmount') {
                addCustomWater();
            }
        });
    </script>
</body>
</html>
