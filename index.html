<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        /* 主页样式 */
        .home-view {
            text-align: center;
        }

        .home-view h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .tool-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .tool-btn {
            padding: 20px 30px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .tool-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.4);
        }

        .tool-btn:active {
            transform: translateY(0);
        }

        /* 详情页样式 */
        .detail-view {
            display: none;
        }

        .detail-view.active {
            display: block;
        }

        .back-btn {
            background: #f0f0f0;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .back-btn:hover {
            background: #e0e0e0;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .date-display {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        /* 圆环进度 */
        .progress-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            position: relative;
        }

        .progress-ring {
            width: 200px;
            height: 200px;
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.5s ease;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .progress-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .progress-value {
            font-size: 36px;
            font-weight: bold;
            color: #333;
        }

        .progress-unit {
            font-size: 14px;
            color: #666;
        }

        .progress-goal {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        /* 按钮 */
        .buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .btn-100 {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .btn-550 {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* 输入框 */
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .input-section input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .input-section input:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-section button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .input-section button:hover {
            background: #5568d3;
        }

        /* 状态提示 */
        .status-indicator {
            text-align: center;
            margin-bottom: 15px;
            font-size: 12px;
            padding: 8px;
            border-radius: 8px;
            background: #f5f5f5;
        }

        .status-indicator.connected {
            background: #d4edda;
            color: #155724;
        }

        .status-indicator.disconnected {
            background: #fff3cd;
            color: #856404;
        }

        .status-indicator.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status-indicator.loading {
            background: #e2e3e5;
            color: #383d41;
        }

        .records-section {
            margin-bottom: 25px;
        }

        .records-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .records-list {
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .record-item:last-child {
            border-bottom: none;
        }

        .record-time {
            font-size: 13px;
            color: #666;
        }

        .record-amount {
            font-weight: bold;
            color: #4facfe;
        }

        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
            transition: background 0.3s ease;
        }

        .delete-btn:hover {
            background: #ee5a5a;
        }

        /* 图表 */
        .chart-section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e0e0e0;
        }

        .chart-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            text-align: center;
        }

        .chart-container {
            width: 100%;
            height: 200px;
        }

        .empty-records {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 14px;
        }

    </style>
</head>
<body>
    <div class="container">
        <!-- 主页视图 -->
        <div id="homeView" class="home-view">
            <h1>工具集</h1>
            <div class="tool-grid">
                <button class="tool-btn" onclick="showWaterTracker()">
                    <span>💧</span>
                    <span>喝水记录</span>
                </button>
            </div>
        </div>

        <!-- 喝水记录详情视图 -->
        <div id="waterTrackerView" class="detail-view">
            <button class="back-btn" onclick="goHome()">
                <span>←</span>
                <span>返回主页</span>
            </button>
            
            <h1>💧 喝水记录</h1>
            <div class="date-display" id="dateDisplay"></div>

            <!-- 圆环进度 -->
            <div class="progress-container">
                <svg class="progress-ring">
                    <circle
                        class="progress-ring__circle-bg"
                        stroke="#e0e0e0"
                        stroke-width="12"
                        fill="transparent"
                        r="80"
                        cx="100"
                        cy="100"
                    />
                    <circle
                        class="progress-ring__circle"
                        stroke="url(#gradient)"
                        stroke-width="12"
                        stroke-linecap="round"
                        fill="transparent"
                        r="80"
                        cx="100"
                        cy="100"
                    />
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#4facfe" />
                            <stop offset="100%" stop-color="#00f2fe" />
                        </linearGradient>
                    </defs>
                </svg>
                <div class="progress-content">
                    <div class="progress-value" id="totalAmount">0</div>
                    <div class="progress-unit">ml</div>
                    <div class="progress-goal">目标: 2000ml</div>
                </div>
            </div>
            
            <!-- 文件状态 -->
            <div id="statusIndicator" class="status-indicator disconnected">
                未连接 Firebase
            </div>

            <!-- 按钮 -->
            <div class="buttons">
                <button class="btn btn-100" onclick="addWater(100)">+100ml</button>
                <button class="btn btn-550" onclick="addWater(550)">+550ml</button>
            </div>

            <!-- 输入框 -->
            <div class="input-section">
                <input type="number" id="customAmount" placeholder="输入自定义毫升数" min="1" />
                <button onclick="addCustomWater()">添加</button>
            </div>

            <!-- 当天记录 -->
            <div class="records-section">
                <div class="records-title">今日记录</div>
                <div class="records-list" id="recordsList">
                    <div class="empty-records">暂无记录</div>
                </div>
            </div>

            <!-- 图表 -->
            <div class="chart-section">
                <div class="chart-title">最近7天喝水量</div>
                <div class="chart-container">
                    <canvas id="chart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const GOAL = 2000;

        // Firebase 配置 - 请替换为你自己的配置
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyCyOf3OsrT75BYBZVGrOxYrrjjI6FSQ9qM",
            authDomain: "trackers-60fc4.firebaseapp.com",
            projectId: "trackers-60fc4",
            storageBucket: "trackers-60fc4.firebasestorage.app",
            messagingSenderId: "1097582060818",
            appId: "1:1097582060818:web:e31ed34eb2384db47cffcb"
        };

        // 用户 ID (可以是匿名登录后的 uid，或者自定义标识)
        let USER_ID = 'justinzwd'; // 请替换为实际的用户标识

        let waterData = {};
        let isConnected = false;
        let db = null; // Firestore 实例

        // ==================== 视图切换 ====================
        function showWaterTracker() {
            document.getElementById('homeView').style.display = 'none';
            document.getElementById('waterTrackerView').classList.add('active');
            initWaterTracker();
        }

        function goHome() {
            document.getElementById('waterTrackerView').classList.remove('active');
            document.getElementById('homeView').style.display = 'block';
        }

        // ==================== 初始化 Firebase ====================
        async function initFirebase() {
            try {
                // 加载 Firebase SDK
                await loadFirebaseSDK();

                // 初始化 Firebase (Compat 版本)
                const app = firebase.initializeApp(FIREBASE_CONFIG);
                db = firebase.firestore();

                isConnected = true;
                updateStatus('connected', '已连接 Firebase');
                return true;
            } catch (err) {
                console.error('初始化 Firebase 失败:', err);
                updateStatus('error', '连接失败: ' + err.message);
                return false;
            }
        }

        // 加载 Firebase SDK (使用 Compat 版本)
        async function loadFirebaseSDK() {
            return new Promise((resolve, reject) => {
                // 检查是否已加载
                if (window.firebase) {
                    resolve();
                    return;
                }

                // 按顺序加载 Firebase SDK (Compat 版本)
                const scripts = [
                    'https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js',
                    'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js',
                    'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js'
                ];

                let loadedCount = 0;
                const onScriptLoad = () => {
                    loadedCount++;
                    if (loadedCount === scripts.length) {
                        resolve();
                    }
                };

                scripts.forEach(src => {
                    const script = document.createElement('script');
                    script.src = src;
                    script.onload = onScriptLoad;
                    script.onerror = reject;
                    document.head.appendChild(script);
                });
            });
        }

        // ==================== 数据加载和保存 (Firebase) ====================
        async function loadData() {
            if (!db) {
                waterData = {};
                return;
            }

            try {
                updateStatus('loading', '正在加载数据...');

                // Compat 版本的 API
                const userDocRef = db.collection('waterRecords').doc(USER_ID);
                const docSnap = await userDocRef.get();

                if (docSnap.exists) {
                    waterData = docSnap.data() || {};
                    if (typeof waterData !== 'object') {
                        waterData = {};
                    }
                } else {
                    waterData = {};
                }

                updateStatus('connected', '已连接 Firebase');
                updateUI();
            } catch (err) {
                console.error('加载数据失败:', err);
                updateStatus('error', '加载数据失败: ' + err.message);
                waterData = {};
            }
        }

        async function saveData(data) {
            waterData = data;

            if (!db) {
                return;
            }

            try {
                cleanOldData(waterData);

                // Compat 版本的 API
                const userDocRef = db.collection('waterRecords').doc(USER_ID);
                await userDocRef.set(waterData);

                console.log('数据已保存到 Firebase');
            } catch (err) {
                console.error('保存数据失败:', err);
                updateStatus('error', '保存数据失败: ' + err.message);
            }
        }

        // ==================== 状态更新 ====================
        function updateStatus(status, message) {
            const indicator = document.getElementById('statusIndicator');
            indicator.textContent = message;
            indicator.className = 'status-indicator ' + status;
        }

        // ==================== 初始化喝水记录 ====================
        async function initWaterTracker() {
            updateDateDisplay();

            // 检查 Firebase 配置
            if (!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey === 'YOUR_FIREBASE_API_KEY') {
                updateStatus('error', '请在代码中设置 FIREBASE_CONFIG');
                return;
            }

            try {
                // 初始化并连接 Firebase
                const initialized = await initFirebase();
                if (initialized) {
                    await loadData();
                }
            } catch (err) {
                console.error('初始化失败:', err);
                updateStatus('error', '初始化失败: ' + err.message);
            }
        }

        // ==================== 日期相关 ====================
        function getTodayString() {
            const today = new Date();
            return today.toISOString().split('T')[0];
        }

        function updateDateDisplay() {
            const today = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('dateDisplay').textContent = today.toLocaleDateString('zh-CN', options);
        }

        // ==================== 喝水记录操作 ====================
        async function addWater(amount) {
            const today = getTodayString();

            if (!waterData[today]) {
                waterData[today] = [];
            }

            waterData[today].push({
                id: Date.now(),
                amount: amount,
                time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
            });

            await saveData(waterData);
            updateUI();
        }

        async function addCustomWater() {
            const input = document.getElementById('customAmount');
            const amount = parseInt(input.value);

            if (amount && amount > 0) {
                await addWater(amount);
                input.value = '';
            } else {
                alert('请输入有效的正整数');
            }
        }

        async function deleteRecord(recordId) {
            const today = getTodayString();

            if (waterData[today]) {
                waterData[today] = waterData[today].filter(r => r.id !== recordId);
                await saveData(waterData);
                updateUI();
            }
        }

        // ==================== 数据处理 ====================
        function cleanOldData(data) {
            const today = new Date();
            const thirtyDaysAgo = new Date(today);
            thirtyDaysAgo.setDate(today.getDate() - 30);

            Object.keys(data).forEach(date => {
                const recordDate = new Date(date);
                if (recordDate < thirtyDaysAgo) {
                    delete data[date];
                }
            });
        }

        function getTodayTotal() {
            const today = getTodayString();
            const todayRecords = waterData[today] || [];
            return todayRecords.reduce((sum, record) => sum + record.amount, 0);
        }

        // ==================== UI 更新 ====================
        function updateProgress(total) {
            const circle = document.querySelector('.progress-ring__circle');
            const radius = circle.r.baseVal.value;
            const circumference = radius * 2 * Math.PI;

            circle.style.strokeDasharray = `${circumference} ${circumference}`;

            const progress = Math.min(total / GOAL, 1);
            const offset = circumference - progress * circumference;
            circle.style.strokeDashoffset = offset;
        }

        function updateUI() {
            const total = getTodayTotal();
            document.getElementById('totalAmount').textContent = total;
            updateProgress(total);
            updateRecordsList();
            drawChart();
        }

        function updateRecordsList() {
            const today = getTodayString();
            const records = waterData[today] || [];
            const listEl = document.getElementById('recordsList');

            if (records.length === 0) {
                listEl.innerHTML = '<div class="empty-records">暂无记录</div>';
                return;
            }

            listEl.innerHTML = records.map(record => `
                <div class="record-item">
                    <span class="record-time">${record.time}</span>
                    <div>
                        <span class="record-amount">+${record.amount}ml</span>
                        <button class="delete-btn" onclick="deleteRecord(${record.id})">删除</button>
                    </div>
                </div>
            `).join('');

            listEl.scrollTop = listEl.scrollHeight;
        }

        // ==================== 图表 ====================
        function getLast7DaysData() {
            const result = [];
            const today = new Date();

            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(today.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                const records = waterData[dateStr] || [];
                const total = records.reduce((sum, r) => sum + r.amount, 0);

                result.push({
                    date: date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }),
                    total: total
                });
            }

            return result;
        }

        function drawChart() {
            const canvas = document.getElementById('chart');
            const ctx = canvas.getContext('2d');
            const data = getLast7DaysData();

            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;

            const padding = 40;
            const width = canvas.width - padding * 2;
            const height = canvas.height - padding * 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const maxAmount = Math.max(...data.map(d => d.total), GOAL);
            const yMax = Math.ceil(maxAmount / 500) * 500;

            ctx.strokeStyle = '#e0e0e0';
            ctx.fillStyle = '#999';
            ctx.font = '11px Arial';
            ctx.textAlign = 'right';

            for (let i = 0; i <= 4; i++) {
                const y = padding + height - (i / 4) * height;
                const value = Math.round((i / 4) * yMax);

                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(canvas.width - padding, y);
                ctx.stroke();

                ctx.fillText(value, padding - 5, y + 4);
            }

            ctx.textAlign = 'center';
            const xStep = width / (data.length - 1);
            data.forEach((d, i) => {
                const x = padding + i * xStep;
                ctx.fillText(d.date, x, canvas.height - padding + 20);
            });

            const points = data.map((d, i) => ({
                x: padding + i * xStep,
                y: padding + height - (d.total / yMax) * height,
                value: d.total
            }));

            if (points.length > 1) {
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);

                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }

                ctx.strokeStyle = '#667eea';
                ctx.lineWidth = 2;
                ctx.stroke();

                const gradient = ctx.createLinearGradient(0, padding, 0, canvas.height - padding);
                gradient.addColorStop(0, 'rgba(102, 126, 234, 0.3)');
                gradient.addColorStop(1, 'rgba(102, 126, 234, 0)');

                ctx.lineTo(points[points.length - 1].x, canvas.height - padding);
                ctx.lineTo(points[0].x, canvas.height - padding);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();
            }

            points.forEach(point => {
                ctx.beginPath();
                ctx.arc(point.x, point.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#667eea';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = '#333';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(point.value, point.x, point.y - 10);
            });
        }

        // ==================== 事件监听 ====================
        window.addEventListener('resize', drawChart);

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.activeElement.id === 'customAmount') {
                addCustomWater();
            }
        });
    </script>
</body>
</html>
